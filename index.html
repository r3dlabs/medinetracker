<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack Multi-User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans" x-data="medApp()" x-init="initTimer()">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">💊 MedTrack Pro</h1>
            <p class="text-gray-500 italic" x-text="isWatcher ? 'Watcher Mode' : 'Patient Mode'"></p>
        </header>

        <div x-show="!isLoggedIn" class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Access ID</label>
                    <input type="text" x-model="inputId" placeholder="P-101" 
                           class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none uppercase">
                </div>
                
                <div class="flex gap-2">
                    <button @click="login('patient')" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                        I am the Patient
                    </button>
                    <button @click="login('watcher')" class="flex-1 border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-lg hover:bg-indigo-50 transition">
                        I am a Watcher
                    </button>
                </div>
            </div>
        </div>

        <div x-show="isLoggedIn" x-cloak>
            <template x-if="isWatcher && missedAlerts.length > 0">
                <div class="mb-4 p-4 bg-red-600 text-white rounded-lg animate-pulse">
                    <p class="font-bold">⚠️ CRITICAL NOTIFICATION</p>
                    <p class="text-sm">The patient has missed <span x-text="missedAlerts.length"></span> dose(s) by over 15 minutes!</p>
                </div>
            </template>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Schedule for <span x-text="patientName"></span></h2>
                <button @click="logout()" class="text-xs text-slate-400 hover:text-red-500">Exit Session</button>
            </div>

            <div class="space-y-4">
                <template x-for="(med, index) in currentMeds" :key="index">
                    <div :class="med.taken ? 'opacity-60 bg-white' : (isCriticallyLate(med.time) ? 'bg-red-50 border-red-300' : 'bg-white')"
                         class="p-4 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                        
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-indigo-500" x-text="med.time"></p>
                                <h3 class="text-lg font-bold text-slate-800" x-text="med.name"></h3>
                                <p class="text-sm text-slate-500" x-text="med.dose"></p>
                            </div>

                            <template x-if="!isWatcher">
                                <button @click="toggleMed(index)" 
                                        :class="med.taken ? 'bg-green-500' : 'bg-slate-200'"
                                        class="h-10 w-10 rounded-full flex items-center justify-center transition-all">
                                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </button>
                            </template>
                            
                            <template x-if="isWatcher">
                                <div :class="med.taken ? 'text-green-600' : 'text-slate-300'" class="font-bold text-sm uppercase">
                                    <span x-text="med.taken ? 'Completed' : 'Pending'"></span>
                                </div>
                            </template>
                        </div>

                        <div x-show="!med.taken && isCriticallyLate(med.time)" class="mt-2 text-[10px] font-black text-red-500 uppercase tracking-widest">
                            🚨 Overdue by 15+ Minutes
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function medApp() {
            return {
                isLoggedIn: false,
                isWatcher: false,
                inputId: '',
                patientName: '',
                currentMeds: [],
                missedAlerts: [],

                database: {
                    "P-101": { name: "John Doe", meds: [{ name: "Lisinopril", dose: "10mg", time: "08:00", taken: false }, { name: "Metformin", dose: "500mg", time: "17:30", taken: false }] },
                    "P-102": { name: "Jane Smith", meds: [{ name: "Aspirin", dose: "81mg", time: "09:00", taken: false }] }
                },

                login(role) {
                    const id = this.inputId.toUpperCase();
                    if (this.database[id]) {
                        this.isWatcher = (role === 'watcher');
                        this.patientName = this.database[id].name;
                        this.currentMeds = this.database[id].meds;
                        this.isLoggedIn = true;
                        this.checkMissedDoses();
                    } else {
                        alert("Invalid ID");
                    }
                },

                toggleMed(index) {
                    if(this.isWatcher) return;
                    this.currentMeds[index].taken = !this.currentMeds[index].taken;
                    this.checkMissedDoses();
                },

                // Logic for 15-minute missed notification
                isCriticallyLate(scheduledTime) {
                    const now = new Date();
                    const [hours, minutes] = scheduledTime.split(':');
                    const scheduledDate = new Date();
                    scheduledDate.setHours(hours, minutes, 0);

                    // Calculate difference in minutes
                    const diff = (now - scheduledDate) / (1000 * 60);
                    return diff >= 15; 
                },

                checkMissedDoses() {
                    this.missedAlerts = this.currentMeds.filter(m => !m.taken && this.isCriticallyLate(m.time));
                },

                initTimer() {
                    // Check every 30 seconds for missed doses to trigger alerts
                    setInterval(() => {
                        if(this.isLoggedIn) this.checkMissedDoses();
                    }, 30000);
                },

                logout() {
                    this.isLoggedIn = false;
                    this.isWatcher = false;
                    this.inputId = '';
                }
            }
        }
    </script>
</body>
</html>
