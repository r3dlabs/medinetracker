<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareSync Pro | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900" x-data="careApp()">

    <nav class="glass border-b border-slate-200 sticky top-0 z-50 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🛡️</span>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">CareSync</h1>
            </div>
            <div class="flex gap-1 bg-slate-100 p-1 rounded-xl" x-show="isLoggedIn">
                <button @click="view = 'daily'" :class="view === 'daily' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">Daily</button>
                <button @click="view = 'weekly'" :class="view === 'weekly' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">History</button>
                <button @click="openAdmin()" :class="view === 'admin' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">Manage</button>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6">

        <div x-show="!isLoggedIn" class="mt-12 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold">Patient Portal</h2>
                <p class="text-slate-500 text-sm">Enter ID, Full Name, or Email to begin</p>
            </div>
            
            <input type="text" x-model="loginInput" placeholder="ID, Name, or Email" 
                   class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-4 text-center font-medium focus:ring-2 focus:ring-indigo-500 outline-none transition">
            
            <button @click="login()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition shadow-lg">
                Access Schedule
            </button>
        </div>

        <div x-show="isLoggedIn" x-cloak>
            
            <div x-show="view === 'daily'">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800" x-text="patientData.name"></h2>
                        <p class="text-indigo-600 font-bold text-sm uppercase tracking-widest" x-text="todayDate"></p>
                    </div>
                    <button @click="logout()" class="p-2 text-slate-400 hover:text-red-500 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>

                <div class="space-y-4">
                    <template x-for="(task, index) in patientData.meds" :key="index">
                        <div class="group flex gap-4 items-center">
                            <div class="w-12 text-right">
                                <span class="text-[10px] font-black text-slate-400" x-text="task.time"></span>
                            </div>
                            <div :class="task.taken ? 'bg-slate-100 border-transparent' : (isMissedBy15(task.time) ? 'bg-red-50 border-red-200 shadow-md' : 'bg-white border-slate-200 shadow-sm')" 
                                 class="flex-1 p-5 rounded-3xl border transition-all flex items-center justify-between">
                                <div class="flex gap-4 items-center">
                                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl bg-slate-50" x-text="getIcon(task.type)"></div>
                                    <div>
                                        <h3 class="font-bold text-slate-800 leading-tight" x-text="task.name"></h3>
                                        <p class="text-xs text-slate-500" x-text="task.dose || 'Standard Care'"></p>
                                    </div>
                                </div>
                                <button @click="task.taken = !task.taken; persist()" 
                                        :class="task.taken ? 'bg-green-500' : 'bg-slate-100'" 
                                        class="h-10 w-10 rounded-full flex items-center justify-center transition-all">
                                    <svg class="w-5 h-5 text-white" x-show="task.taken" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'weekly'" class="space-y-6">
                <h2 class="text-2xl font-bold">Adherence History</h2>
                <div class="bg-white p-6 rounded-3xl border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-bold text-slate-400 uppercase text-xs">Past 7 Days</span>
                        <span class="text-green-600 font-black">98% Success</span>
                    </div>
                    <div class="flex justify-between gap-2">
                        <template x-for="i in 7">
                            <div class="flex-1 space-y-2">
                                <div class="h-24 w-full bg-slate-50 rounded-lg relative overflow-hidden">
                                    <div class="absolute bottom-0 w-full bg-indigo-500" :style="'height:' + (Math.random() * 40 + 60) + '%'"></div>
                                </div>
                                <div class="text-[10px] text-center font-bold text-slate-400" x-text="'04/' + (10+i)"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="view === 'admin'" class="space-y-6">
                <div class="bg-orange-50 border border-orange-200 p-4 rounded-2xl flex items-center gap-3">
                    <span class="text-xl">🛡️</span>
                    <p class="text-xs text-orange-800 font-medium">You are in <strong>Managed Mode</strong>. Any changes made here will update the master schedule for this patient.</p>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold mb-4">Edit Profile</h3>
                    <div class="space-y-3 mb-6">
                        <input type="text" x-model="patientData.name" placeholder="Full Name" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                        <input type="text" x-model="patientData.email" placeholder="Email Address" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                    </div>

                    <h3 class="font-bold mb-4">Activities & Meds</h3>
                    <div class="space-y-3">
                        <template x-for="(task, i) in patientData.meds" :key="i">
                            <div class="grid grid-cols-12 gap-2 p-3 bg-slate-50 rounded-2xl items-center">
                                <select x-model="task.type" class="col-span-3 text-[10px] p-1 rounded border">
                                    <option value="med">Meds</option>
                                    <option value="eat">Eat</option>
                                    <option value="hygiene">Hygiene</option>
                                </select>
                                <input type="text" x-model="task.name" class="col-span-4 text-xs p-1 rounded border">
                                <input type="time" x-model="task.time" class="col-span-3 text-xs p-1 rounded border">
                                <button @click="patientData.meds.splice(i, 1)" class="col-span-2 text-red-400">✕</button>
                            </div>
                        </template>
                        <button @click="addTask()" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-xs font-bold">+ New Item</button>
                    </div>
                    <button @click="persist(); alert('Changes Saved!')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-8">Apply Changes</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function careApp() {
            return {
                view: 'daily',
                isLoggedIn: false,
                loginInput: '',
                patientData: null,
                todayDate: new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }),

                // Hardcoded Master DB (Initial state)
                database: JSON.parse(localStorage.getItem('careSyncDB')) || [
                    { 
                        id: 'P-101', 
                        name: 'Tony Stark', 
                        email: 'tony@starkintl.com',
                        meds: [
                            { type: 'med', name: 'Arc Core Supplement', dose: '1 tab', time: '08:00', taken: false },
                            { type: 'eat', name: 'Green Smoothie', dose: '12oz', time: '09:00', taken: false },
                            { type: 'hygiene', name: 'Armor Cleaning', dose: '', time: '11:00', taken: false }
                        ] 
                    }
                ],

                login() {
                    const input = this.loginInput.trim().toLowerCase();
                    // Search by ID, Name, or Email
                    const user = this.database.find(p => 
                        p.id.toLowerCase() === input || 
                        p.name.toLowerCase() === input || 
                        p.email.toLowerCase() === input
                    );

                    if (user) {
                        this.patientData = user;
                        this.isLoggedIn = true;
                    } else {
                        alert("Access Denied: Record not found.");
                    }
                },

                openAdmin() {
                    const pw = prompt("Enter Management Passcode:");
                    if (pw === "!ronMan") {
                        this.view = 'admin';
                    } else {
                        alert("Unauthorized!");
                    }
                },

                getIcon(type) {
                    return { med: '💊', eat: '🍎', hygiene: '🧼' }[type] || '📋';
                },

                addTask() {
                    this.patientData.meds.push({ type: 'med', name: 'New Task', dose: '', time: '12:00', taken: false });
                },

                persist() {
                    localStorage.setItem('careSyncDB', JSON.stringify(this.database));
                },

                logout() {
                    this.isLoggedIn = false;
                    this.loginInput = '';
                    this.view = 'daily';
                },

                isMissedBy15(scheduledTime) {
                    const now = new Date();
                    const [h, m] = scheduledTime.split(':');
                    const sched = new Date();
                    sched.setHours(h, m, 0);
                    return (now - sched) / (1000 * 60) >= 15;
                }
            }
        }
    </script>
</body>
</html>
