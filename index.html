<!DOCTYPE html>
<html lang="en" x-data="careApp()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareSync Pro | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind configuration to enable class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .glass { backdrop-filter: blur(10px); }
        /* Smooth transition for theme switching */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <nav class="glass border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 p-4 bg-white/80 dark:bg-slate-900/80">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-black text-slate-800 dark:text-white tracking-tight">CareSync</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button @click="toggleTheme()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400">
                    <template x-if="!darkMode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </template>
                    <template x-if="darkMode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </template>
                </button>

                <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl" x-show="isLoggedIn">
                    <button @click="view = 'daily'" :class="view === 'daily' ? 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600 dark:text-indigo-400' : 'text-slate-500'" class="px-3 py-1.5 rounded-lg text-[10px] font-bold transition uppercase">Daily</button>
                    <button @click="openAdmin()" :class="view === 'admin' ? 'bg-white dark:bg-slate-700 shadow-sm text-orange-600' : 'text-slate-500'" class="px-3 py-1.5 rounded-lg text-[10px] font-bold transition uppercase">Manage</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6">

        <div x-show="!isLoggedIn" class="mt-12 bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
            <h2 class="text-2xl font-bold text-center mb-6">Patient Portal</h2>
            <input type="text" x-model="loginInput" placeholder="ID, Name, or Email" 
                   class="w-full p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl mb-4 text-center focus:ring-2 focus:ring-indigo-500 outline-none transition dark:text-white">
            <button @click="login()" class="w-full bg-slate-900 dark:bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">Access Schedule</button>
        </div>

        <div x-show="isLoggedIn" x-cloak>
            
            <div x-show="view === 'daily'">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-3xl font-black" x-text="patientData.name"></h2>
                        <p class="text-indigo-600 dark:text-indigo-400 font-bold text-sm uppercase" x-text="todayDate"></p>
                    </div>
                    <button @click="logout()" class="text-slate-400 hover:text-red-500 font-bold text-sm">Logout</button>
                </div>

                <div class="space-y-4">
                    <template x-for="(task, index) in patientData.meds" :key="index">
                        <div class="flex gap-4 items-center">
                            <div class="w-12 text-right">
                                <span class="text-[10px] font-black text-slate-400" x-text="task.time"></span>
                            </div>
                            <div :class="task.taken ? 'bg-slate-100 dark:bg-slate-800/50 opacity-60' : (isMissedBy15(task.time) ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-900' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800')" 
                                 class="flex-1 p-5 rounded-3xl border transition-all flex items-center justify-between">
                                <div class="flex gap-4 items-center">
                                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl bg-slate-50 dark:bg-slate-800" x-text="getIcon(task.type)"></div>
                                    <div>
                                        <h3 class="font-bold leading-tight" x-text="task.name"></h3>
                                        <p class="text-xs text-slate-500" x-text="task.dose || 'Standard Care'"></p>
                                    </div>
                                </div>
                                <button @click="task.taken = !task.taken; persist()" 
                                        :class="task.taken ? 'bg-green-500' : 'bg-slate-200 dark:bg-slate-700'" 
                                        class="h-10 w-10 rounded-full flex items-center justify-center shadow-inner">
                                    <svg class="w-5 h-5 text-white" x-show="task.taken" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'admin'" class="space-y-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800">
                    <h3 class="font-bold mb-4">Edit Master Schedule</h3>
                    <div class="space-y-3">
                        <template x-for="(task, i) in patientData.meds" :key="i">
                            <div class="grid grid-cols-12 gap-2 p-3 bg-slate-50 dark:bg-slate-800 rounded-2xl items-center">
                                <input type="text" x-model="task.name" class="col-span-7 text-xs p-2 rounded border dark:bg-slate-700 dark:border-slate-600">
                                <input type="time" x-model="task.time" class="col-span-3 text-xs p-2 rounded border dark:bg-slate-700 dark:border-slate-600">
                                <button @click="patientData.meds.splice(i, 1)" class="col-span-2 text-red-500 font-bold">✕</button>
                            </div>
                        </template>
                    </div>
                    <button @click="persist(); alert('Schedule Updated!')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold mt-6">Save Changes</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function careApp() {
            return {
                view: 'daily',
                isLoggedIn: false,
                loginInput: '',
                patientData: null,
                darkMode: localStorage.getItem('theme') === 'dark',
                todayDate: new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }),

                database: JSON.parse(localStorage.getItem('careSyncDB')) || [
                    { 
                        id: 'P-101', 
                        name: 'Tony Stark', 
                        email: 'tony@starkintl.com',
                        meds: [
                            { type: 'med', name: 'Arc Core Supplement', dose: '1 tab', time: '08:00', taken: false },
                            { type: 'eat', name: 'Green Smoothie', dose: '12oz', time: '09:00', taken: false }
                        ] 
                    }
                ],

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                },

                login() {
                    const input = this.loginInput.trim().toLowerCase();
                    const user = this.database.find(p => 
                        p.id.toLowerCase() === input || 
                        p.name.toLowerCase() === input || 
                        p.email.toLowerCase() === input
                    );
                    if (user) {
                        this.patientData = user;
                        this.isLoggedIn = true;
                    } else { alert("Record not found."); }
                },

                openAdmin() {
                    if (prompt("Enter Management Passcode:") === "!ronMan") this.view = 'admin';
                    else alert("Unauthorized!");
                },

                getIcon(type) { return { med: '💊', eat: '🍎', hygiene: '🧼' }[type] || '📋'; },
                persist() { localStorage.setItem('careSyncDB', JSON.stringify(this.database)); },
                logout() { this.isLoggedIn = false; this.loginInput = ''; this.view = 'daily'; },

                isMissedBy15(scheduledTime) {
                    const now = new Date();
                    const [h, m] = scheduledTime.split(':');
                    const sched = new Date();
                    sched.setHours(h, m, 0);
                    return (now - sched) / (1000 * 60) >= 15;
                }
            }
        }
    </script>
</body>
</html>
